<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InwitClipps Frontend Launcher</title>
  <meta http-equiv="refresh" content="0; url=./generated/index.html" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", sans-serif;
      color: #f5f3ff;
      background:
        radial-gradient(circle at top left, rgba(168, 85, 247, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.16), transparent 22%),
        #09090f;
    }

    .card {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: rgba(20, 20, 30, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.04em;
    }

    p {
      color: #b4b5c3;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 12px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>InwitClipps frontend</h1>
    <p>The generated marketing site now lives in <code>frontend/generated</code> and is served automatically by the backend. If your browser does not redirect immediately, use the link below.</p>
    <a href="./generated/index.html">Open generated site</a>
  </div>
</body>
</html>
