# InwitClipps — local development stack.
# Database and storage are hosted on Supabase (not in this compose).
# Redis is local for BullMQ; API and workers run from the backend/ folder.

version: '3.8'

services:
  # ── Redis for BullMQ job queues ──
  redis:
    image: redis:7-alpine
    container_name: inwitclipps-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Express API server ──
  api:
    build: ./backend
    container_name: inwitclipps-api
    ports:
      - '${PORT:-3001}:${PORT:-3001}'
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: node src/server.js
    restart: unless-stopped

  # ── BullMQ workers (download, transcription, ai-detection, render) ──
  workers:
    build: ./backend
    container_name: inwitclipps-workers
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    command: node src/workers/index.js
    restart: unless-stopped
    volumes:
      - tmp_data:/tmp/inwitclipps

volumes:
  redis_data:
    driver: local
  tmp_data:
    driver: local
